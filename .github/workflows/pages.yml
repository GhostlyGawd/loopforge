name: Deploy site to GitHub Pages

# Publishes the generated catalog (site/index.html) to GitHub Pages.
# The site is regenerated from the library by tools/build.py so what ships
# always matches the committed loops. Runs on pushes to the default branch.
#
# No manual setup needed: the `actions/configure-pages` step below enables
# GitHub Pages (build type "workflow") automatically on first run via the API,
# so the site goes live without anyone flipping a repo setting. After that,
# every push to main regenerates and redeploys.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable + configure Pages (auto-enables on first run)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate and regenerate the site
        run: |
          python3 tools/validate.py
          python3 tools/build.py
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
